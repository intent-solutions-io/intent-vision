# Terraform Plan & Drift Detection
# Runs on PRs touching infrastructure/terraform/** and scheduled for drift detection
#
# [Task: intentvision-lxm.6]

name: Terraform Plan

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/terraform/**'
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/terraform/**'
  # schedule disabled — burns Actions minutes
  # schedule:
  #   # Run daily at 6 AM UTC for drift detection
  #   - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to plan'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  TF_VERSION: '1.5.7'
  GCP_PROJECT_ID: intentvision
  GCP_REGION: us-central1
  WORKING_DIR: infrastructure/terraform

jobs:
  terraform-plan:
    name: Terraform Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for WIF
      pull-requests: write  # Comment on PRs

    strategy:
      matrix:
        environment: [staging]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Validate
        id: validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -var-file=environments/${{ matrix.environment }}/terraform.tfvars \
            -input=false \
            -no-color \
            -detailed-exitcode \
            -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Check for Drift
        id: drift
        run: |
          EXIT_CODE=${{ steps.plan.outputs.exitcode }}
          if [ "$EXIT_CODE" == "0" ]; then
            echo "status=no-changes" >> $GITHUB_OUTPUT
            echo "✅ No infrastructure drift detected"
          elif [ "$EXIT_CODE" == "2" ]; then
            echo "status=drift-detected" >> $GITHUB_OUTPUT
            echo "⚠️ Infrastructure drift detected!"
            # On scheduled runs, fail the workflow
            if [ "${{ github.event_name }}" == "schedule" ]; then
              echo "::error::Infrastructure drift detected on scheduled check"
              exit 1
            fi
          else
            echo "status=error" >> $GITHUB_OUTPUT
            echo "❌ Terraform plan failed"
            exit 1
          fi

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n\n... (truncated)'
              : planOutput;

            const body = `## Terraform Plan - ${{ matrix.environment }}

            | Step | Status |
            |------|--------|
            | Format | ${{ steps.fmt.outcome == 'success' && '✅' || '⚠️' }} |
            | Init | ${{ steps.init.outcome == 'success' && '✅' || '❌' }} |
            | Validate | ${{ steps.validate.outcome == 'success' && '✅' || '❌' }} |
            | Plan | ${{ steps.drift.outputs.status == 'no-changes' && '✅ No changes' || (steps.drift.outputs.status == 'drift-detected' && '⚠️ Changes detected' || '❌ Error') }} |

            <details>
            <summary>Show Plan Output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Upload Plan Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.environment }}
          path: |
            ${{ env.WORKING_DIR }}/tfplan
            ${{ env.WORKING_DIR }}/plan_output.txt
          retention-days: 7
